<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instructor | Jaime Mahoney | AI Workshop</title>
    
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        h2 {
            margin: 10px 0;
            font-weight: normal;
            color: #d1d9ff;
        }

        p {
            margin-top: 20px;
            font-size: 1.1rem;
        }

        .badge {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            border-radius: 25px;
            background: #ffffff;
            color: #2a5298;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Instructor</h1>
        <h2>Jaime Mahoney</h2>
        <p>Welcome to the AI Workshop</p>
        <div class="badge">AI Workshop</div>
    </div>

</body>
</html>
